[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"

[tool.ruff]
target-version = "py311"
line-length = 120
exclude = [".git", "__pycache__", ".streamlit"]

[tool.ruff.lint]
select = ["E", "W", "F"]
ignore = ["E501", "W291", "W293", "E402"]

[tool.coverage.run]
source = ["."]
omit = [
    "tests/*",
    ".streamlit/*",
    "views/*",        # Streamlit page modules require a running server
    "seo.py",
]

[tool.coverage.report]
show_missing = true
skip_covered = false
