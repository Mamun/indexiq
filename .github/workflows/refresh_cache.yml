name: Refresh Screener Cache

on:
  schedule:
    # Mon–Sat 02:00 UTC: fast scripts (analyst, forward_pe, short_interest)
    - cron: "0 2 * * 1-6"
    # Sunday 02:00 UTC: all scripts including quarterly (metadata + fundamentals)
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      full_refresh:
        description: "Run all scripts including quarterly (metadata + fundamentals)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  refresh-cache:
    name: Refresh screener cache
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -e .

      # ── Daily: analyst consensus (weekly cadence is fine nightly) ──────────
      - name: Build analyst consensus cache
        run: python cache/scripts/build_analyst_consensus_cache.py

      # ── Daily: forward P/E ─────────────────────────────────────────────────
      - name: Build forward P/E cache
        run: python cache/scripts/build_forward_pe_cache.py

      # ── Daily: short interest (monthly data, safe to re-fetch nightly) ─────
      - name: Build short interest cache
        run: python cache/scripts/build_short_interest_cache.py

      # ── Sunday + manual full_refresh: metadata (quarterly data) ───────────
      - name: Build ticker metadata cache
        if: |
          github.event_name == 'workflow_dispatch' && github.event.inputs.full_refresh == 'true'
          || github.event.schedule == '0 2 * * 0'
        run: python cache/scripts/build_metadata_cache.py

      # ── Sunday + manual full_refresh: fundamentals (quarterly data) ────────
      - name: Build fundamentals cache
        if: |
          github.event_name == 'workflow_dispatch' && github.event.inputs.full_refresh == 'true'
          || github.event.schedule == '0 2 * * 0'
        run: python cache/scripts/build_fundamentals_cache.py

      # ── Commit & push updated JSON files to main ───────────────────────────
      - name: Commit and push cache files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache/screener/*.json
          if git diff --cached --quiet; then
            echo "No changes to commit — cache is already up to date."
          else
            git commit -m "chore: nightly screener cache refresh [$(date -u '+%Y-%m-%d')]"
            git push origin main
          fi
